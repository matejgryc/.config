# Basic settings
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"
set -g mouse on

set -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

set -g set-clipboard on
set -g base-index 1
set -g status-position bottom
set -g status-style bg=black
set -g status-justify centre
set -g status-left-length 7
set -g status-left "                "
set -g window-status-format " #{window_name} "
set -g window-status-current-style fg=white,bg=magenta
set -g window-status-current-format " #{window_name} "
set -g status-right-length 7
set -g status-right "%H:%M  "

unbind C-b
set -g prefix C-a
bind-key C-a send-prefix

# split windows in same dir as current pane
unbind %
unbind '"'
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"

# Popup window utilities
bind -n M-t display-popup -d "#{pane_current_path}" -w 85% -h 85% -E "bash"
bind -n M-c display-popup -d "#{pane_current_path}" -w 85% -h 85% -E "python3"
bind n display-popup -d "#{pane_current_path}" -w 85% -h 85% -E nvim ~/NOTES.md

# Close the popup from inside it
bind-key -T popup C-g display-popup -C

# Pane navigation
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Window switching without prefix
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-0 select-window -t 10

# Reload config
unbind r
bind r source-file $HOME/.config/tmux/tmux.conf


